<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  html, body { width: 100%; height: 100%; background: #060606; font-family: 'IBM Plex Mono', monospace; display: flex; align-items: center; justify-content: center; }

  .title { font-size: 11px; letter-spacing: 0.35em; color: #1e1e1e; text-transform: uppercase; }
  .links { display: flex; gap: 12px; }
  a { display: block; padding: 14px 28px; border: 1px solid #1c1c1c; color: #2a2a2a; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; transition: all 0.2s; }
  a:hover { border-color: #444; color: #888; }
</style>
</head>
<body>
<div class="container">
  <div class="title">greenroom</div>
  <div class="links">
    <a href="/tv.html">TV Display</a>
    <a href="/mobile.html">Mobile</a>

</div>

</html>
